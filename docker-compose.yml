services:
  db:
    image: postgres:17
    container_name: postgres_db
    environment:
      POSTGRES_DB: gameDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 130171
    ports:
      - "5433:5432"  # Нестандартный порт 5433 на хосте -> стандартный 5432 в контейнере
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Файл инициализации (если нужен)
    networks:
      - app-network
    restart: unless-stopped
    
  redis:
    image: redis:7.2-alpine
    container_name: redis_cache1
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PAS}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3  
    
  frontend:
    build:
      context: ./SuzumesDeepDungeon/DeepDungeonClient
    networks:
      - app-network

  backend:
    build:
      context: ./SuzumesDeepDungeon
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Jwt__Key=${JWT_KEY}
      - rawgAPI=${RAWG_API_KEY}
      - ConnectionStrings__DefaultConnection=${PSQL_CON_STRING}
      - ConnectionStrings__RedisConnection=${REDIS_CON_STRING}
    depends_on:
      - db
      - redis
    volumes:
      - logs:/app/logs
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: C:\docker_data\postgres  # Путь для данных PostgreSQL
  redis_data:
    driver: local
  logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: C:\docker_data\logs

networks:
  app-network:
    driver: bridge