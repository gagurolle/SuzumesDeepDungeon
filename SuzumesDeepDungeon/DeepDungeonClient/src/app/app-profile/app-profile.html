<div class="profile-page">
  <div class="profile-card">
    <div class="profile-avatar">{{ (auth.getUserName || 'U').charAt(0).toUpperCase() }}</div>
    <div class="profile-info">
      <h2 class="profile-name">{{ auth.getUserName }}</h2>
      <span class="role-badge">{{ auth.getUserRole }}</span>
    </div>
    <div class="profile-actions">
      <button class="btn-home" (click)="goHome()">
        <span class="material-icons">home</span>
        На главную
      </button>
      <button class="btn-logout" (click)="logout()">
        <span class="material-icons">logout</span>
        Выйти
      </button>
    </div>
  </div>

  <app-api-form [username]="auth.getUserName"></app-api-form>
</div>
