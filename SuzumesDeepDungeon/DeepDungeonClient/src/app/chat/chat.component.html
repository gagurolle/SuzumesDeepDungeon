<!-- components/chat/chat.component.html -->
<div class="chat-container">
  <div class="connection-status" [class.connected]="isConnected" [class.disconnected]="!isConnected">
    Статус: {{ isConnected ? 'Подключено' : 'Отключено' }}
  </div>

  <div class="messages-container">
    <div *ngFor="let message of messages" class="message" [class.own-message]="message.user === currentUser">
      <div class="message-header">
        <strong>{{ message.user }}</strong>
        <span class="timestamp">{{ message.timestamp | date:'HH:mm:ss' }}</span>
      </div>
      <div class="message-text">{{ message.text }}</div>
    </div>
  </div>

  <div class="message-input">
    <input 
      type="text" 
      [(ngModel)]="newMessage" 
      (keyup.enter)="sendMessage()" 
      placeholder="Введите сообщение..."
      [disabled]="!isConnected">
    <button (click)="sendMessage()" [disabled]="!isConnected || !newMessage.trim()">
      Отправить
    </button>
  </div>
</div>
